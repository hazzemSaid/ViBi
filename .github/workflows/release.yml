name: Release (Android & iOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Run Android build'
        required: false
        default: true
        type: boolean
      build_ios:
        description: 'Run iOS build'
        required: false
        default: true
        type: boolean
      create_release:
        description: 'Create GitHub Release (manual runs)'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Optional release tag (example: v1.0.1). Used only when create_release=true'
        required: false
        default: ''

jobs:
  build-android:
    name: Build Android APK & AAB
    if: ${{ github.event_name == 'push' || github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare .env for CI
        shell: bash
        run: |
          if [ -f .env ]; then
            echo ".env already exists"
          elif [ -n "${{ secrets.DOTENV_FILE }}" ]; then
            printf "%s" "${{ secrets.DOTENV_FILE }}" > .env
            echo ".env created from DOTENV_FILE secret"
          elif [ -f .env.example ]; then
            cp .env.example .env
            echo ".env created from .env.example"
          else
            echo "CI=true" > .env
            echo "Fallback .env created"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/
          retention-days: 7

  build-ios:
    name: Build iOS Simulator
    if: ${{ github.event_name == 'push' || github.event.inputs.build_ios == 'true' }}
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare .env for CI
        shell: bash
        run: |
          if [ -f .env ]; then
            echo ".env already exists"
          elif [ -n "${{ secrets.DOTENV_FILE }}" ]; then
            printf "%s" "${{ secrets.DOTENV_FILE }}" > .env
            echo ".env created from DOTENV_FILE secret"
          elif [ -f .env.example ]; then
            cp .env.example .env
            echo ".env created from .env.example"
          else
            echo "CI=true" > .env
            echo "Fallback .env created"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS Simulator
        run: flutter build ios --simulator --release --no-codesign

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/Release-iphonesimulator/
          retention-days: 7

  create-release:
    name: Create GitHub Release
    if: ${{ github.event_name == 'push' || (github.event.inputs.create_release == 'true' && github.event.inputs.build_android == 'true' && github.event.inputs.build_ios == 'true') }}
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts/android

      - name: Download iOS simulator artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-build
          path: artifacts/ios-simulator

      - name: Resolve release tag and version
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            if [ -z "$TAG" ]; then
              TAG="manual-${{ github.run_number }}"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ViBi ${{ steps.release_meta.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/android/flutter-apk/app-release.apk
            artifacts/android/flutter-apk/app-armeabi-v7a-release.apk
            artifacts/android/flutter-apk/app-arm64-v8a-release.apk
            artifacts/android/flutter-apk/app-x86_64-release.apk
            artifacts/android/bundle/release/app-release.aab
          body: |
            # ViBi Release ${{ steps.release_meta.outputs.version }}

            ## 📱 Downloads

            ### Android
            - **app-release.apk** - Universal APK (all architectures included)
            - **app-armeabi-v7a-release.apk** - 32-bit ARM (older devices)
            - **app-arm64-v8a-release.apk** - 64-bit ARM (modern devices)
            - **app-x86_64-release.apk** - Intel x86 (emulators)
            - **app-release.aab** - Google Play App Bundle

            ### iOS
            - **iOS Simulator Build** - Available in artifacts for testing on simulator
            - For production, submit IPA to App Store Connect

            ## 📝 Build Information
            - **Release Date**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.sha }}
            - **Branch**: main

            ## 🚀 Installation Guide

            ### Android
            **Direct Installation (APK)**:
            ```bash
            adb install artifacts/android/flutter-apk/app-arm64-v8a-release.apk
            ```

            **Google Play Store**:
            1. Upload `app-release.aab` to Google Play Console
            2. Fill in store listing details
            3. Submit for review

            ### iOS
            **Run on Simulator**:
            ```bash
            flutter run -d <simulator-device-id>
            ```

            **For Production (App Store)**:
            For App Store submission, you'll need to:
            1. Generate an iOS Distribution certificate
            2. Create a provisioning profile
            3. Build with: `flutter build ipa --release`
            4. Upload to App Store Connect

            ## ✅ Changes in This Release
            See commit history for detailed changes.
