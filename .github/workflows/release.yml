name: Release (Android & iOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Run Android build'
        required: false
        default: true
        type: boolean
      build_ios:
        description: 'Run iOS build'
        required: false
        default: true
        type: boolean
      create_release:
        description: 'Create GitHub Release (manual runs)'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Optional release tag (example: v1.0.1). Used only when create_release=true'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  test-matrix:
    name: Test - ${{ matrix.feature }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        feature:
          - name: answer
            path: test/features/answer
          - name: auth
            path: test/features/auth
          - name: feed
            path: test/features/feed
          - name: home
            path: test/features/home
          - name: profile
            path: test/features/profile
          - name: reactions
            path: test/features/reactions
          - name: recommendation
            path: test/features/recommendation
          - name: search
            path: test/features/search

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare .env for CI tests
        shell: bash
        run: |
          mkdir -p assets
          if [ -n "${{ secrets.DOTENV_FILE }}" ]; then
            printf "%s" "${{ secrets.DOTENV_FILE }}" > .env
            cp .env assets/app_config.txt
          elif [ -f .env.example ]; then
            cp .env.example .env
            cp .env assets/app_config.txt
          else
            echo "CI=true" > .env
            cp .env assets/app_config.txt
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Run ${{ matrix.feature.name }} tests
        run: flutter test ${{ matrix.feature.path }}

  build-android:
    name: Build Android APK & AAB
    if: ${{ github.event_name == 'push' || github.event.inputs.build_android == true }}
    needs: [test-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare .env for CI
        shell: bash
        run: |
          mkdir -p assets
          if [ -n "${{ secrets.DOTENV_FILE }}" ]; then
            printf "%s" "${{ secrets.DOTENV_FILE }}" > .env
            cp .env assets/app_config.txt
          elif [ -f .env.example ]; then
            cp .env.example .env
            cp .env assets/app_config.txt
          else
            echo "CI=true" > .env
            cp .env assets/app_config.txt
          fi

      - name: Provide google-services.json for CI
        shell: bash
        run: |
          if [ -f android/app/google-services.json ]; then
            echo "google-services.json already exists"
          elif [ -n "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" ]; then
            printf "%s" "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > android/app/google-services.json
          elif [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            printf "%s" "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          else
            echo "Missing GOOGLE_SERVICES_JSON_B64 / GOOGLE_SERVICES_JSON secret" >&2
            exit 1
          fi

          python3 -c "import json; json.load(open('android/app/google-services.json', 'r', encoding='utf-8'))"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 7
          if-no-files-found: error

  build-ios:
    name: Build iOS Simulator
    if: ${{ github.event_name == 'push' || github.event.inputs.build_ios == true }}
    needs: [test-matrix]
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare .env for CI
        shell: bash
        run: |
          mkdir -p assets
          if [ -n "${{ secrets.DOTENV_FILE }}" ]; then
            printf "%s" "${{ secrets.DOTENV_FILE }}" > .env
            cp .env assets/app_config.txt
          elif [ -f .env.example ]; then
            cp .env.example .env
            cp .env assets/app_config.txt
          else
            echo "CI=true" > .env
            cp .env assets/app_config.txt
          fi

      - name: Provide GoogleService-Info.plist for CI
        shell: bash
        run: |
          if [ -f ios/Runner/GoogleService-Info.plist ]; then
            echo "GoogleService-Info.plist already exists"
          elif [ -n "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}" ]; then
            printf "%s" "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
          elif [ -n "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" ]; then
            printf "%s" "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > ios/Runner/GoogleService-Info.plist
          else
            echo "No iOS Firebase plist secret provided; continuing"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS Simulator
        run: flutter build ios --simulator --debug --no-codesign

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/Debug-iphonesimulator/
          retention-days: 7
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    if: ${{ github.event_name == 'push' || (github.event.inputs.create_release == true && (github.event.inputs.build_android == true || github.event.inputs.build_ios == true)) }}
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts/android

      - name: Download iOS simulator artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-build
          path: artifacts/ios-simulator

      - name: Resolve release tag and version
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            if [ -z "$TAG" ]; then
              TAG="manual-${{ github.run_number }}"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ViBi ${{ steps.release_meta.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/android/app-release.apk
            artifacts/android/app-armeabi-v7a-release.apk
            artifacts/android/app-arm64-v8a-release.apk
            artifacts/android/app-x86_64-release.apk
            artifacts/android/app-release.aab
          body: |
            # ViBi Release ${{ steps.release_meta.outputs.version }}

            ## Downloads

            ### Android
            - **app-release.apk** - Universal APK (all architectures included)
            - **app-armeabi-v7a-release.apk** - 32-bit ARM (older devices)
            - **app-arm64-v8a-release.apk** - 64-bit ARM (modern devices)
            - **app-x86_64-release.apk** - Intel x86 (emulators)
            - **app-release.aab** - Google Play App Bundle

            ### iOS
            - **iOS Simulator Build** - Available in artifacts for testing on simulator
            - For production, submit IPA to App Store Connect

            ## Build Information
            - **Commit**: ${{ github.sha }}
            - **Branch**: ${{ github.ref_name }}

            ## Installation Guide

            ### Android
            **Direct Installation (APK)**:
            ```bash
            adb install artifacts/android/app-arm64-v8a-release.apk
            ```

            **Google Play Store**:
            1. Upload `app-release.aab` to Google Play Console
            2. Fill in store listing details
            3. Submit for review

            ### iOS
            **Run on Simulator**:
            ```bash
            flutter run -d <simulator-device-id>
            ```

            **For Production (App Store)**:
            For App Store submission, you'll need to:
            1. Generate an iOS Distribution certificate
            2. Create a provisioning profile
            3. Build with: `flutter build ipa --release`
            4. Upload to App Store Connect
