name: Tests (Push and PR)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-tests:
    name: Flutter Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare .env for CI tests
        shell: bash
        run: |
          mkdir -p assets
          if [ -n "${{ secrets.DOTENV_FILE }}" ]; then
            printf "%s" "${{ secrets.DOTENV_FILE }}" > .env
            cp .env assets/app_config.txt
            echo "Environment variables saved to assets/app_config.txt"
          elif [ -f .env.example ]; then
            cp .env.example .env
            cp .env assets/app_config.txt
          else
            echo "CI=true" > .env
            cp .env assets/app_config.txt
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze (non-blocking)
        run: flutter analyze || true

      - name: Run Flutter tests
        run: flutter test --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
